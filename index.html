<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Elegan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #2c2c2c;
            --bg: #f9f6f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg); color: var(--dark); line-height: 1.6; text-align: center; }

        header {
            height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; color: white;
        }
        header h1 { font-family: 'Great Vibes', cursive; font-size: clamp(3.5rem, 10vw, 5.5rem); margin: 10px 0; }
        header h2 { font-family: 'Cinzel', serif; letter-spacing: 5px; font-size: 1.1rem; }

        section { padding: 80px 20px; max-width: 900px; margin: 0 auto; }
        h3 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.8rem; margin-bottom: 30px; text-transform: uppercase; }
        .ornament { color: var(--gold); font-size: 2rem; margin-bottom: 10px; }

        .event-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 40px; }
        .event-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .event-card i { font-size: 2rem; color: var(--gold); margin-bottom: 15px; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .gallery-item { height: 250px; border-radius: 8px; overflow: hidden; border: 3px solid white; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        .rsvp-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        
        .btn { 
            background: var(--gold); color: white; padding: 15px; border: none; border-radius: 50px; 
            font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn:hover { background: #b38e4a; }

        #daftarDoa { 
            margin-top: 30px; text-align: left; max-height: 400px; overflow-y: auto; 
            padding: 20px; background: #fff; border-radius: 15px; border-top: 5px solid var(--gold);
        }
        .doa-item { border-bottom: 1px solid #eee; padding: 15px 0; }
        .doa-item strong { color: var(--gold); display: block; font-size: 1rem; }
        .doa-item p { font-size: 0.9rem; color: #555; font-style: italic; margin-top: 5px; }

        footer { padding: 40px; background: var(--dark); color: white; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h2>THE WEDDING OF</h2>
        <h1>Romeo & Juliet</h1>
        <p>12 . 12 . 2026</p>
    </header>

    <section>
        <div class="ornament">❦</div>
        <h3>Waktu & Tempat</h3>
        <div class="event-grid">
            <div class="event-card">
                <i class="fas fa-ring"></i>
                <h4>Akad Nikah</h4>
                <p>08:00 - 10:00 WIB</p>
                <p>Masjid Agung Istiqomah</p>
            </div>
            <div class="event-card">
                <i class="fas fa-glass-cheers"></i>
                <h4>Resepsi</h4>
                <p>11:00 - 14:00 WIB</p>
                <p>Ballroom Grand Hotel</p>
            </div>
        </div>
    </section>

    <section>
        <h3>Galeri Foto</h3>
        <div class="gallery-grid">
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=500"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1519225495810-751759228172?auto=format&fit=crop&w=500"></div>
            <div class="gallery-item"><img src="https://images.unsplash.com/photo-1583939003579-730e3918a45a?auto=format&fit=crop&w=500"></div>
        </div>
    </section>

    <section id="rsvp" style="background-color: #fdfaf7;">
        <div class="ornament">❦</div>
        <h3>Doa Restu & RSVP</h3>
        <div class="rsvp-container">
            <form id="doaForm">
                <div class="form-group">
                    <input type="text" id="namaTamu" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-group">
                    <textarea id="isiDoa" rows="3" placeholder="Tulis doa restu Anda..." required></textarea>
                </div>
                <button type="submit" id="submitBtn" class="btn">Kirim Doa</button>
            </form>
        </div>

        <div id="daftarDoa">
            <p style="text-align: center; color: #999;">Memuat doa...</p>
        </div>
    </section>

    <footer>
        <p>© 2026 Romeo & Juliet Wedding</p>
    </footer>

<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyAs90rGFmx3ALPn_dYSB28iS9roXU7qxJE",
            authDomain: "undangandigital-645e8.firebaseapp.com",
            databaseURL: "https://undangandigital-645e8-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "undangandigital-645e8",
            storageBucket: "undangandigital-645e8.firebasestorage.app",
            messagingSenderId: "28358958617",
            appId: "1:28358958617:web:c9c993b9f1490c77cc9488",
            measurementId: "G-TSE1N56Y4X"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const doaCol = collection(db, "doa_pernikahan_baru"); 
    
        const form = document.getElementById('doaForm');
        const btn = document.getElementById('submitBtn');
    
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const namaUser = document.getElementById('namaTamu').value;
            const doaUser = document.getElementById('isiDoa').value;
    
            btn.disabled = true;
            btn.innerText = "Mengirim...";
    
            try {
                await addDoc(doaCol, {
                    pengirim: namaUser,
                    pesan: doaUser,
                    waktu: serverTimestamp() // Menyimpan waktu server
                });
                form.reset();
            } catch (err) {
                console.error(err);
                alert("Gagal mengirim! Pastikan Rules Firestore sudah set ke true.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Kirim Doa";
            }
        });
    
        const q = query(doaCol, orderBy("waktu", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('daftarDoa');
            container.innerHTML = ""; 
            
            if (snapshot.empty) {
                container.innerHTML = '<p style="text-align:center; color:#999; padding:20px;">Belum ada doa. Jadilah yang pertama!</p>';
                return;
            }
    
            snapshot.forEach((doc) => {
                const data = doc.data();
                
                // Logika merubah format waktu Firebase ke format tanggal lokal (Indonesia)
                let tanggalTampil = "";
                if (data.waktu) {
                    const date = data.waktu.toDate();
                    tanggalTampil = date.toLocaleString('id-ID', { 
                        day: 'numeric', 
                        month: 'long', 
                        year: 'numeric', 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                } else {
                    tanggalTampil = "Baru saja";
                }
    
                const div = document.createElement('div');
                div.className = 'doa-item';
                
                div.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: baseline;">
                        <strong>${data.pengirim || 'Tamu'}</strong>
                        <small style="color: #999; font-size: 0.7rem;">${tanggalTampil}</small>
                    </div>
                    <p>"${data.pesan || ''}"</p>
                `;
                container.appendChild(div);
            });
        });
    </script>
</body>
</html>
